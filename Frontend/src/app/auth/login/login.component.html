<div class="auth-container">
  <h2>{{'Login'| translate}}</h2>
  <form (ngSubmit)="onLogin()">
    <input type="text" placeholder="Username" [(ngModel)]="username" name="username" required />
    <input type="password" placeholder="Password" [(ngModel)]="password" name="password" required />
    <button type="submit">{{'Login' | translate }}</button>
    <p>{{ 'NoAcc'|translate }}<a routerLink="/register">{{'register'| translate}}</a></p>
  </form>
</div>
