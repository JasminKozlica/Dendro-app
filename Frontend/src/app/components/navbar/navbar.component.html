<nav class="navbar">
    <a routerLink="/search" routerLinkActive="active">{{ 'DATABASE' | translate }}</a>
    <a routerLink="/density" routerLinkActive="active">{{ 'DBI'| translate }}</a>
    <a routerLink="/tree-input" routerLinkActive="active">{{ 'CALC' | translate }}</a>
    <div class="language-dropdown">
      <div class="language-selected">
        🌐 Language
      </div>
      <ul class="language-menu">
        <li (click)="switchLanguage('en')">English</li>
        <li (click)="switchLanguage('bs')">Bosanski</li>
        <li (click)="switchLanguage('de')">Deutsch</li>
      </ul>
    </div>
    <div class = "user-menu" (mouseenter)="showDropdown  = true" (mouseleave)="showDropdown = false">
      <span class="username">👤 {{'user'|translate}} ▼</span>
      <ul class = "dropdown"  *ngIf="showDropdown">
          <li><a routerLink="/profile">{{'update'|translate}}</a></li>
          <li><a (click)="changeUser()">{{'CU'|translate}}</a></li>
          <li><a (click)="logout()">{{'logout' | translate}}</a></li>
      </ul>
    </div>
</nav>
<router-outlet></router-outlet>
